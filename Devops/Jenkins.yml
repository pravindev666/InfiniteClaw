- hosts: india
  remote_user: ec2-user
  become: yes
  vars:
    ports: 9000
  tasks:
    - name: DOWNLOAD JENKINS REPO
      yum_repository:
        name: Jenkins Repo 
        description: Jenkins Repo 
        baseurl: baseurl=http://pkg.jenkins.io/redhat-stable
        gpgkey: https://pkg.jenkins.io/redhat-stable/jenkins.io-2023.key
    
    - name: Install java and jenkins Packages
      yum:
         name: "{{ item }}"
         state: present 
      loop:
         - java
         - jenkins
    - name: goin to change port no
      lineinfile:
         path: /etc/sysconfig/jenkins
         regexp: '^JENKINS_PORT='
         line: JENKINS_PORT={{ports}}
      notify: restart jenkins
        
      -name:
      service:
        name: jenkins
        state: started
  handlers:
   - name: restart jenkins
     service: 
        name: jenkins
        state: restarted
                  
                  

      
      
      
      
      
      
      
      
      